<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic League — Match Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-bg: #0b0a10;
    --c-surface: #111318;
    --c-surface2: #181c24;
    --c-border: rgba(255,255,255,0.07);
    --c-border2: rgba(255,255,255,0.13);
    --c-text: #e8eaf0;
    --c-muted: #6b7280;
    --c-accent: #a855f7;
    --c-accent2: #3a9eff;
    --c-win: #34c97a;
    --c-lose: #e84040;
    --c-win-bg: rgba(52,201,122,0.1);
    --c-lose-bg: rgba(232,64,64,0.1);
    --c-gold: #f0b429;
  }

  html, body {
    font-family: 'Exo 2', sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; top:0; left:0; width:100%; height:100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0; opacity:0.4;
  }

  .app { position: relative; z-index:1; max-width: 900px; margin: 0 auto; padding: 24px 16px 64px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; padding-bottom: 20px;
    border-bottom: 1px solid var(--c-border2);
    flex-wrap: wrap; gap: 12px;
  }
  .logo { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 3px; text-transform: uppercase; color: var(--c-accent); }
  .logo span { color: var(--c-text); }
  .tagline { font-size: 11px; color: var(--c-muted); letter-spacing: 2px; margin-top: 2px; }

  .nav { display: flex; gap: 4px; background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 8px; padding: 4px; }
  .nav button {
    font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px;
    font-size: 13px; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
    background: transparent; color: var(--c-muted); transition: all 0.15s; text-transform: uppercase;
  }
  .nav button.active { background: var(--c-accent); color: #000; }
  .nav button:hover:not(.active) { color: var(--c-text); background: var(--c-surface2); }
  .nav button.admin-only { display: none; }
  body.admin-mode .nav button.admin-only { display: inline-block; }

  .section { display: none; }
  .section.visible { display: block; }

  /* Auth banner */
  .auth-bar {
    display: flex; align-items: center; gap: 10px; justify-content: flex-end;
    margin-bottom: 0;
  }
  .auth-status {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px; font-weight: 600;
  }
  .auth-status.viewer { background: rgba(107,114,128,0.15); color: var(--c-muted); }
  .auth-status.admin { background: rgba(168,85,247,0.15); color: var(--c-accent); }
  .auth-btn {
    font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 12px; border-radius: 4px; cursor: pointer; border: 1px solid var(--c-border2);
    background: transparent; color: var(--c-muted); transition: all 0.15s; font-family: 'Exo 2', sans-serif;
  }
  .auth-btn:hover { color: var(--c-text); border-color: var(--c-accent); }

  /* Viewer overlay on write-only tabs */
  .viewer-lock {
    display: none; text-align: center; padding: 48px;
    color: var(--c-muted); font-size: 14px; line-height: 1.8;
  }
  body:not(.admin-mode) .viewer-lock { display: block; }
  body:not(.admin-mode) .admin-content { display: none; }

  /* Leaderboard */
  .lb-header {
    display: grid; grid-template-columns: 36px 1fr 80px 60px 60px 80px 80px;
    gap: 8px; padding: 8px 16px; margin-bottom: 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px; color: var(--c-muted); text-transform: uppercase;
  }
  .lb-row {
    display: grid; grid-template-columns: 36px 1fr 80px 60px 60px 80px 80px;
    gap: 8px; align-items: center; padding: 14px 16px;
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 8px; margin-bottom: 6px; transition: border-color 0.15s;
  }
  .lb-row:hover { border-color: var(--c-border2); }
  .lb-row.rank1 { border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.05); }
  .lb-row.rank2 { border-color: rgba(192,192,192,0.3); }
  .lb-row.rank3 { border-color: rgba(184,115,51,0.3); }

  .rank { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--c-muted); text-align: center; }
  .rank.gold { color: var(--c-accent); font-weight: 700; }
  .rank.silver { color: #c0c0c0; font-weight: 700; }
  .rank.bronze { color: #b87333; font-weight: 700; }

  .player-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

  .stat-val { font-family: 'Share Tech Mono', monospace; font-size: 14px; text-align: right; }
  .stat-val.win { color: var(--c-win); }
  .stat-val.lose { color: var(--c-lose); }


  /* Match history */
  .match-card {
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 10px; margin-bottom: 8px; padding: 16px;
    display: grid; grid-template-columns: 90px 1fr auto;
    gap: 16px; align-items: center; transition: border-color 0.15s;
  }
  .match-card:hover { border-color: var(--c-border2); }
  .match-result { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 2px; text-align: center; text-transform: uppercase; }
  .match-score { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--c-muted); text-align: center; margin-top: 2px; }
  .match-teams { display: flex; flex-direction: column; gap: 6px; }
  .match-team { display: flex; align-items: center; gap: 6px; font-size: 13px; flex-wrap: wrap; }
  .team-label { font-size: 10px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; margin-right: 4px; }
  .team-label.amber { background: rgba(168,85,247,0.15); color: var(--c-accent); }
  .team-label.blue { background: rgba(58,158,255,0.15); color: var(--c-accent2); }
  .player-pill { padding: 2px 8px; border-radius: 4px; font-size: 12px; background: var(--c-surface2); border: 1px solid var(--c-border); }
  .match-meta { text-align: right; font-size: 12px; color: var(--c-muted); }
  .match-date { font-family: 'Share Tech Mono', monospace; font-size: 11px; }

  /* Forms */
  .form-card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 12px; padding: 24px; }
  .form-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; color: var(--c-accent); margin-bottom: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--c-muted); }
  input, select, textarea {
    background: var(--c-surface2); border: 1px solid var(--c-border2); border-radius: 6px;
    color: var(--c-text); font-family: 'Exo 2', sans-serif; font-size: 14px;
    padding: 10px 12px; outline: none; transition: border-color 0.15s; width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--c-accent); }
  input::placeholder, textarea::placeholder { color: var(--c-muted); }
  select option { background: var(--c-surface2); }
  .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: start; margin-bottom: 16px; }
  .vs-divider { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; color: var(--c-muted); padding-top: 28px; text-align: center; }

  .btn-primary {
    background: var(--c-accent); color: #000; border: none; border-radius: 6px;
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
    letter-spacing: 1.5px; text-transform: uppercase; padding: 12px 24px;
    cursor: pointer; transition: opacity 0.15s; width: 100%;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger {
    background: transparent; color: var(--c-lose); border: 1px solid var(--c-border);
    border-radius: 4px; font-size: 11px; padding: 3px 8px; cursor: pointer;
    font-family: 'Exo 2', sans-serif; transition: background 0.15s;
  }
  .btn-danger:hover { background: var(--c-lose-bg); }
  .btn-sm {
    background: var(--c-surface2); color: var(--c-accent); border: 1px solid var(--c-border2);
    border-radius: 4px; font-size: 11px; padding: 4px 10px; cursor: pointer;
    font-family: 'Exo 2', sans-serif; font-weight: 600; transition: background 0.15s; white-space: nowrap;
  }
  .btn-sm:hover { background: var(--c-border2); }

  /* Players */
  .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .player-card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 10px; padding: 16px; transition: border-color 0.15s; }
  .player-card:hover { border-color: var(--c-border2); }
  .player-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .avatar-lg { width: 40px; height: 40px; border-radius: 50%; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .player-card-name { font-weight: 600; font-size: 16px; }
  .player-stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .mini-stat { background: var(--c-surface2); border-radius: 6px; padding: 8px; text-align: center; }
  .mini-stat-val { font-family: 'Share Tech Mono', monospace; font-size: 16px; }
  .mini-stat-label { font-size: 10px; color: var(--c-muted); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .wr-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: 'Share Tech Mono', monospace; }
  .wr-high { background: var(--c-win-bg); color: var(--c-win); }
  .wr-low { background: var(--c-lose-bg); color: var(--c-lose); }
  .wr-mid { background: rgba(168,85,247,0.1); color: var(--c-accent); }
  .add-player-form { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
  .add-player-form input { flex: 1; }

  .empty-state { text-align: center; padding: 48px; color: var(--c-muted); font-size: 14px; line-height: 1.8; }

  /* Win selector */
  .win-selector { display: flex; gap: 8px; }
  .win-btn {
    flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--c-border2);
    cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s;
    background: transparent; color: var(--c-muted);
  }
  .win-btn.selected-amber { background: rgba(168,85,247,0.2); color: var(--c-accent); border-color: var(--c-accent); }
  .win-btn.selected-blue { background: rgba(58,158,255,0.2); color: var(--c-accent2); border-color: var(--c-accent2); }

  .textarea-players { min-height: 80px; resize: vertical; }
  .hint { font-size: 11px; color: var(--c-muted); margin-top: 4px; }
  .winner-tag { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; background: var(--c-win-bg); color: var(--c-win); }
  .section-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: var(--c-muted); }

  /* Audit log */
  .log-entry {
    display: grid; grid-template-columns: 140px 90px 1fr;
    gap: 12px; align-items: start; padding: 12px 16px;
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 8px; margin-bottom: 6px; font-size: 13px;
  }
  .log-time { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--c-muted); line-height: 1.6; }
  .log-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 8px; border-radius: 4px; text-align: center; white-space: nowrap;
    align-self: start;
  }
  .log-badge.add-match { background: rgba(52,201,122,0.12); color: var(--c-win); }
  .log-badge.del-match { background: rgba(232,64,64,0.12); color: var(--c-lose); }
  .log-badge.add-player { background: rgba(168,85,247,0.12); color: var(--c-accent); }
  .log-badge.del-player { background: rgba(232,64,64,0.12); color: var(--c-lose); }
  .log-badge.login { background: rgba(58,158,255,0.12); color: var(--c-accent2); }
  .log-detail { color: var(--c-muted); line-height: 1.5; }
  .log-detail strong { color: var(--c-text); font-weight: 600; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    background: var(--c-win); color: #000; font-weight: 600; font-size: 13px;
    padding: 10px 18px; border-radius: 8px; transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease; font-family: 'Exo 2', sans-serif;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--c-lose); color: #fff; }

  /* Modals */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-box {
    background: var(--c-surface); border: 1px solid var(--c-border2);
    border-radius: 12px; padding: 24px 28px; max-width: 360px; width: 90%;
    transform: translateY(12px); transition: transform 0.2s ease;
  }
  .modal-overlay.show .modal-box { transform: translateY(0); }
  .modal-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
  .modal-title.danger { color: var(--c-lose); }
  .modal-title.accent { color: var(--c-accent); }
  .modal-msg { font-size: 14px; color: var(--c-muted); line-height: 1.6; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-cancel { background: transparent; color: var(--c-muted); border: 1px solid var(--c-border2); border-radius: 6px; padding: 8px 18px; cursor: pointer; font-family: 'Exo 2', sans-serif; font-size: 13px; transition: all 0.15s; }
  .modal-cancel:hover { color: var(--c-text); }
  .modal-confirm { background: var(--c-lose); color: #fff; border: none; border-radius: 6px; padding: 8px 18px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; transition: opacity 0.15s; }
  .modal-confirm:hover { opacity: 0.85; }
  .modal-confirm.accent { background: var(--c-accent); color: #000; }

  /* Auth modal password input */
  .modal-input { width: 100%; margin-bottom: 16px; }

  @media(max-width:640px){
    .lb-header, .lb-row { grid-template-columns: 28px 1fr 50px 70px; }
    .lb-header > :nth-child(3), .lb-row > :nth-child(3) { display: none; }
    .form-row, .teams-row { grid-template-columns: 1fr; }
    .vs-divider { padding-top: 0; }
    .match-card { grid-template-columns: 70px 1fr; }
    .match-meta { display: none; }
    .nav button { font-size: 11px; padding: 7px 10px; }
    .log-entry { grid-template-columns: 1fr; gap: 6px; }
  }



  /* Audit log */
  .log-entry {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 16px; background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 8px; margin-bottom: 6px; font-size: 13px;
  }
  .log-time {
    font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--c-muted);
    white-space: nowrap; padding-top: 1px; min-width: 110px;
  }
  .log-action { flex: 1; line-height: 1.5; }
  .log-type {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 2px 6px; border-radius: 3px; margin-right: 6px;
  }
  .log-type.add { background: var(--c-win-bg); color: var(--c-win); }
  .log-type.del { background: var(--c-lose-bg); color: var(--c-lose); }
  .log-type.log { background: rgba(168,85,247,0.1); color: var(--c-accent); }

  /* Hide admin-only elements for viewers */
  .admin-only { display: none; }
  body.is-admin .admin-only { display: revert; }
  body.is-admin .viewer-only { display: none; }

  /* Hero icons */
  .hero-icon { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--c-surface2); }
  .hero-icon-sm { width: 22px; height: 22px; border-radius: 3px; object-fit: cover; }
  .hero-icons-row { display: flex; gap: 4px; align-items: center; }
  .hero-icon-placeholder { width: 22px; height: 22px; border-radius: 3px; background: var(--c-surface2); border: 1px solid var(--c-border); }

  /* Match log form - player rows */
  .team-rows { display: flex; flex-direction: column; gap: 6px; }
  .player-hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: center; }

  /* Custom searchable dropdown */
  .csd-wrap { position: relative; }
  .csd-input {
    width: 100%; padding: 7px 10px; font-size: 13px; cursor: pointer;
    background: var(--c-surface2); border: 1px solid var(--c-border2);
    border-radius: 6px; color: var(--c-text); font-family: 'Exo 2', sans-serif;
    outline: none; transition: border-color 0.15s;
  }
  .csd-input:focus { border-color: var(--c-accent); }
  .csd-input.has-value { color: var(--c-text); }
  .csd-input::placeholder { color: var(--c-muted); }
  .csd-list {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 500;
    background: var(--c-surface); border: 1px solid var(--c-border2);
    border-radius: 8px; max-height: 200px; overflow-y: auto;
    display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .csd-list.open { display: block; }
  .csd-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    cursor: pointer; font-size: 13px; transition: background 0.1s;
  }
  .csd-item:hover, .csd-item.focused { background: var(--c-surface2); }
  .csd-item img { width: 22px; height: 22px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
  .csd-item .csd-placeholder-icon { width: 22px; height: 22px; border-radius: 3px; background: var(--c-surface2); border: 1px solid var(--c-border); flex-shrink: 0; }
  .csd-empty { padding: 10px 12px; font-size: 12px; color: var(--c-muted); }

  /* Match history hero pills */
  .player-hero-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px 2px 2px; border-radius: 4px; font-size: 12px; background: var(--c-surface2); border: 1px solid var(--c-border); }

  /* Season banner */
  .season-banner {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 16px;
    font-size: 13px;
  }
  .season-label { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 1px; color: var(--c-accent); font-size: 14px; }
</style>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<div class="app" id="main-app">

<script>
  // ============================================================
  // CONFIG — change this password before deploying
  // ============================================================

  // ============================================================
  // Constants
  // ============================================================
  const COLORS = ['#a855f7','#3a9eff','#34c97a','#e84040','#a78bfa','#f97316','#06b6d4','#ec4899','#84cc16','#f59e0b'];
  const BGS    = ['rgba(168,85,247,.2)','rgba(58,158,255,.2)','rgba(52,201,122,.2)','rgba(232,64,64,.2)','rgba(167,139,250,.2)','rgba(249,115,22,.2)','rgba(6,182,212,.2)','rgba(236,72,153,.2)','rgba(132,204,22,.2)','rgba(245,158,11,.2)'];

  // ============================================================
  // State
  // ============================================================
  let state = { players: [], matches: [], auditLog: [], currentSeason: 1, seasons: [] };
  let isAdmin = false;
  let selectedWinner = null;
  let playerFilter = '';
  let heroes = []; // loaded from deadlock-api

  // ============================================================
  // Heroes
  // ============================================================
  async function loadHeroes() {
    try {
      const res = await fetch('https://assets.deadlock-api.com/v2/heroes?only_active=true');
      const data = await res.json();
      heroes = data
        .filter(h => h.name && !h.name.startsWith('hero_'))
        .sort((a, b) => a.name.localeCompare(b.name))
        .map(h => ({
          id: h.id,
          name: h.name,
          icon: h.images?.icon_hero_card_webp || h.images?.minimap_image || null
        }));
      renderMatchForm();
    } catch(e) {
      console.warn('Failed to load heroes:', e);
    }
  }

  function heroOption(h) {
    return `<option value="${h.id}">${escHtml(h.name)}</option>`;
  }

  function heroById(id) {
    return heroes.find(h => h.id == id) || null;
  }

  function heroIconHtml(id, size = 22) {
    const h = heroById(id);
    if (!h || !h.icon) return `<div class="hero-icon-placeholder" style="width:${size}px;height:${size}px"></div>`;
    return `<img class="hero-icon-sm" src="${h.icon}" title="${escHtml(h.name)}" style="width:${size}px;height:${size}px" onerror="this.style.display='none'" />`;
  }

  function topHeroes(playerName, season) {
    const counts = {};
    const seasonMatches = state.matches.filter(m => (m.season || 1) === season);
    seasonMatches.forEach(m => {
      const allPlayers = [...m.team1, ...m.team2];
      const idx1 = m.team1.indexOf(playerName);
      const idx2 = m.team2.indexOf(playerName);
      let heroId = null;
      if (idx1 >= 0 && m.heroes1) heroId = m.heroes1[idx1];
      else if (idx2 >= 0 && m.heroes2) heroId = m.heroes2[idx2];
      if (heroId) counts[heroId] = (counts[heroId] || 0) + 1;
    });
    return Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3)
      .map(([id]) => parseInt(id));
  }

  // ── Custom searchable dropdown ───────────────────────────────────────────
  // Each dropdown tracks: { value, label, open, focusIdx }
  const dropdownState = {};

  function makeCsd(id, items, placeholder) {
    // items: [{value, label, icon?}]
    dropdownState[id] = { value: '', label: '', items, filtered: items, open: false, focusIdx: -1 };
    return `<div class="csd-wrap" id="csd-wrap-${id}">
      <input class="csd-input" id="csd-input-${id}" placeholder="${placeholder}"
             autocomplete="off" readonly
             onfocus="csdOpen('${id}')"
             oninput="csdFilter('${id}', this.value)"
             onkeydown="csdKey(event, '${id}')" />
      <div class="csd-list" id="csd-list-${id}"></div>
    </div>`;
  }

  function csdRenderList(id) {
    const ds = dropdownState[id];
    const el = document.getElementById('csd-list-' + id);
    if (!el) return;
    if (!ds.filtered.length) {
      el.innerHTML = '<div class="csd-empty">No results</div>';
      return;
    }
    // Use data-csd-id and data-idx only — no inline values to avoid escaping issues
    el.innerHTML = ds.filtered.map((item, i) => {
      const icon = item.icon
        ? `<img src="${item.icon}" onerror="this.style.display='none'" />`
        : `<div class="csd-placeholder-icon"></div>`;
      return `<div class="csd-item${i === ds.focusIdx ? ' focused' : ''}"
        data-csd-id="${id}" data-idx="${i}">${icon}<span>${escHtml(item.label)}</span></div>`;
    }).join('');
  }

  function csdOpen(id) {
    // Close all others first
    Object.keys(dropdownState).forEach(k => { if (k !== id) csdClose(k); });
    const ds = dropdownState[id];
    ds.open = true;
    ds.filtered = ds.items;
    ds.focusIdx = -1;
    const inp = document.getElementById('csd-input-' + id);
    if (inp) { inp.readOnly = false; inp.value = ''; }
    const list = document.getElementById('csd-list-' + id);
    if (list) list.classList.add('open');
    csdRenderList(id);
  }

  function csdClose(id) {
    const ds = dropdownState[id];
    if (!ds) return;
    ds.open = false;
    const list = document.getElementById('csd-list-' + id);
    if (list) list.classList.remove('open');
    // Restore label in input
    const inp = document.getElementById('csd-input-' + id);
    if (inp) { inp.readOnly = true; inp.value = ds.label; }
  }

  function csdFilter(id, query) {
    const ds = dropdownState[id];
    const q = query.toLowerCase();
    ds.filtered = ds.items.filter(item => item.label.toLowerCase().includes(q));
    ds.focusIdx = -1;
    csdRenderList(id);
  }

  function csdSelect(id, value, label) {
    const ds = dropdownState[id];
    ds.value = value;
    ds.label = label;
    csdClose(id);
  }

  function csdKey(e, id) {
    const ds = dropdownState[id];
    if (!ds.open) { if (e.key === 'Enter' || e.key === ' ') csdOpen(id); return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      ds.focusIdx = Math.min(ds.focusIdx + 1, ds.filtered.length - 1);
      csdRenderList(id);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      ds.focusIdx = Math.max(ds.focusIdx - 1, 0);
      csdRenderList(id);
    } else if (e.key === 'Enter' && ds.focusIdx >= 0) {
      const item = ds.filtered[ds.focusIdx];
      if (item) csdSelect(id, item.value, item.label);
    } else if (e.key === 'Escape') {
      csdClose(id);
    }
  }

  function csdGetValue(id) {
    return dropdownState[id] ? dropdownState[id].value : '';
  }

  function csdReset(id) {
    const ds = dropdownState[id];
    if (!ds) return;
    ds.value = ''; ds.label = ''; ds.filtered = ds.items; ds.open = false; ds.focusIdx = -1;
    const inp = document.getElementById('csd-input-' + id);
    if (inp) inp.value = '';
    const list = document.getElementById('csd-list-' + id);
    if (list) list.classList.remove('open');
  }

  // Handle dropdown item clicks and outside-click closing via delegation
  document.addEventListener('mousedown', e => {
    const item = e.target.closest('.csd-item[data-csd-id]');
    if (item) {
      const id = item.dataset.csdId;
      const idx = parseInt(item.dataset.idx);
      const ds = dropdownState[id];
      if (ds && ds.filtered[idx]) {
        const picked = ds.filtered[idx];
        csdSelect(id, picked.value, picked.label);
      }
      return;
    }
    // Close any open dropdown whose wrap doesn't contain the click target
    Object.keys(dropdownState).forEach(id => {
      const wrap = document.getElementById('csd-wrap-' + id);
      if (wrap && !wrap.contains(e.target)) csdClose(id);
    });
  });

  async function tryAdminLogin() {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;
    // Hash the input with SHA-256 and compare to stored hash in Firebase
    const encoder = new TextEncoder();
    const data = encoder.encode(pw);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    // Fetch stored hash from Firebase
    const snapshot = await db.ref('adminHash').get();
    const storedHash = snapshot.val();
    if (hashHex !== storedHash) {
      document.getElementById('pw-error').textContent = 'Wrong password';
      document.getElementById('pw-input').select();
      setTimeout(() => { document.getElementById('pw-error').textContent = ''; }, 2000);
      return;
    }
    setAdminMode(true);
    localStorage.setItem(ADMIN_SESSION_KEY, '1');
    document.getElementById('pw-input').value = '';
    showToast('Admin mode enabled');
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function getColor(name) {
    const idx = state.players.findIndex(p => p.name === name);
    const i = (idx >= 0 ? idx : 0) % COLORS.length;
    return { color: COLORS[i], bg: BGS[i] };
  }

  function computeStats() {
    const season = state.currentSeason || 1;
    const stats = {};
    state.players.forEach(p => { stats[p.name] = { wins: 0, losses: 0, games: 0 }; });
    state.matches
      .filter(m => (m.season || 1) === season)
      .forEach(m => {
        const winners = m.winner === 'amber' ? m.team1 : m.team2;
        const losers  = m.winner === 'amber' ? m.team2 : m.team1;
        winners.forEach(n => {
          if (!stats[n]) stats[n] = { wins: 0, losses: 0, games: 0 };
          stats[n].wins++; stats[n].games++;
        });
        losers.forEach(n => {
          if (!stats[n]) stats[n] = { wins: 0, losses: 0, games: 0 };
          stats[n].losses++; stats[n].games++;
        });
      });
    return stats;
  }

  function wr(s) { return s.games > 0 ? Math.round((s.wins / s.games) * 100) : 0; }
  function wrColor(w) {
    // Gradient: red=<30%, neutral=50%, green=>70%
    // Apply power curve so color shifts aggressively away from 50%
    // Colors: red=#e84040, neutral=#8b8fa8, green=#34c97a
    const clamp = v => Math.max(0, Math.min(1, v));
    const lerp = (a, b, t) => Math.round(a + (b - a) * t);
    // Remap: 30->0, 50->0.5, 70->1, then apply power curve
    const raw = clamp((w - 20) / 60); // 0 at 20%, 1 at 80%
    // Power curve: push values away from 0.5 aggressively
    const t = raw < 0.5
      ? 0.5 * Math.pow(raw * 2, 2.8)
      : 1 - 0.5 * Math.pow((1 - raw) * 2, 2.8);
    let r, g, b;
    if (t <= 0.5) {
      const u = t / 0.5;
      r = lerp(232, 139, u); g = lerp(64, 143, u); b = lerp(64, 168, u);
    } else {
      const u = (t - 0.5) / 0.5;
      r = lerp(139, 52, u); g = lerp(143, 201, u); b = lerp(168, 122, u);
    }
    return `rgb(${r},${g},${b})`;
  }
  function wrClass(w) { return w >= 55 ? 'wr-high' : w <= 45 ? 'wr-low' : 'wr-mid'; }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' })
             + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    } catch { return iso; }
  }

  function logMatch() {
    if (!isAdmin) return;
    const date     = document.getElementById('match-date').value;
    const duration = document.getElementById('match-duration').value.trim();
    const notes    = document.getElementById('match-notes').value.trim();

    // Read from custom searchable dropdowns
    const team1 = [], team2 = [], heroes1 = [], heroes2 = [];
    for (let i = 0; i < 6; i++) {
      team1.push(csdGetValue(`t1p${i}`));
      heroes1.push(csdGetValue(`t1h${i}`) ? parseInt(csdGetValue(`t1h${i}`)) : null);
      team2.push(csdGetValue(`t2p${i}`));
      heroes2.push(csdGetValue(`t2h${i}`) ? parseInt(csdGetValue(`t2h${i}`)) : null);
    }

    // Validate all 6 players selected per team
    if (team1.some(p => !p)) { showToast('All 6 Amber players must be selected', true); return; }
    if (team2.some(p => !p)) { showToast('All 6 Blue players must be selected', true); return; }
    if (!selectedWinner) { showToast('Select the winning team', true); return; }

    // No duplicate players across teams
    const allPlayers = [...team1, ...team2];
    const unique = new Set(allPlayers);
    if (unique.size !== allPlayers.length) { showToast('A player cannot appear twice in the same match', true); return; }

    // All heroes must be selected
    if (heroes1.some(h => !h)) { showToast('All 6 Amber heroes must be selected', true); return; }
    if (heroes2.some(h => !h)) { showToast('All 6 Blue heroes must be selected', true); return; }

    const match = {
      team1, team2, heroes1, heroes2,
      winner: selectedWinner, date, duration, notes,
      season: state.currentSeason || 1
    };
    state.matches.push(match);
    const winner = selectedWinner === 'amber' ? 'Amber' : 'Blue';
    audit('log', `Logged match — ${winner} won. Amber: [${team1.join(', ')}] vs Blue: [${team2.join(', ')}]${date ? ' on ' + date : ''}`, { match });
    saveState();

    // Reset form
    for (let i = 0; i < 6; i++) {
      csdReset(`t1p${i}`); csdReset(`t1h${i}`);
      csdReset(`t2p${i}`); csdReset(`t2h${i}`);
    }
    document.getElementById('match-duration').value = '';
    document.getElementById('match-notes').value = '';
    selectedWinner = null;
    document.getElementById('win-btn-amber').className = 'win-btn';
    document.getElementById('win-btn-blue').className  = 'win-btn';

    showToast('Match logged!');
    showTab('matches');
  }

  // ============================================================
  // Export / Import
  // ============================================================
  function exportData() {
    const exportObj = {
      players: state.players,
      matches: state.matches,
      currentSeason: state.currentSeason || 1
    };
    const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `mystic-league-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Data exported!');
  }

  function exportMatch(idx) {
    const m = state.matches[idx];
    if (!m) return;
    const exportObj = { match: m, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `match-${m.date || 'unknown'}-${idx}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Match exported!');
  }

  function importData(e) {
    if (!isAdmin) return;
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!imported.players || !imported.matches) throw new Error('Invalid format');
        showConfirm('Import Data',
          `Import ${imported.matches.length} matches and ${imported.players.length} players?<br><span style="color:var(--c-lose);font-size:12px">This will REPLACE all current data.</span>`,
          () => {
            state.players        = imported.players  || [];
            state.matches        = imported.matches  || [];
            state.currentSeason  = imported.currentSeason || 1;
            // Preserve existing audit log and deleted records if not in import
            state.auditLog       = imported.auditLog       || state.auditLog || [];
            state.deletedMatches = imported.deletedMatches || state.deletedMatches || [];
            state.deletedPlayers = imported.deletedPlayers || state.deletedPlayers || [];
            audit('add', `Imported data: ${imported.matches.length} matches, ${imported.players.length} players`);
            saveState();
            showToast('Data imported!');
          });
      } catch(err) {
        showToast('Invalid file format', true);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // ============================================================
  // UI helpers
  // ============================================================
  function showTab(tab) {
    const tabs = ['leaderboard','matches','players','add','log'];
    tabs.forEach(t => {
      const el = document.getElementById('tab-' + t);
      if (el) el.classList.toggle('visible', t === tab);
    });
    document.querySelectorAll('.nav button').forEach((b, i) => {
      const tabNames = isAdmin
        ? ['leaderboard','matches','players','add','log']
        : ['leaderboard','matches','players'];
      b.classList.toggle('active', tabNames[i] === tab);
    });
  }

  function showToast(msg, err = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (err ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = 'toast'; }, 2800);
  }

  // ============================================================
  // Custom confirm modal
  // ============================================================
  let modalResolve = () => {};
  function showConfirm(title, msg, onConfirm, confirmLabel = 'Delete') {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-msg').innerHTML = msg;
    document.getElementById('modal-confirm-btn').textContent = confirmLabel;
    document.getElementById('modal-overlay').classList.add('show');
    modalResolve = (confirmed) => {
      document.getElementById('modal-overlay').classList.remove('show');
      modalResolve = () => {};
      if (confirmed) onConfirm();
    };
  }
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) modalResolve(false);
  });

  // ============================================================
  // Player filter
  // ============================================================
  function filterPlayers(query) {
    playerFilter = query.trim().toLowerCase();
    renderPlayers();
  }

  // ============================================================
  // Event delegation for delete buttons
  // ============================================================
  document.addEventListener('click', e => {
    const matchBtn = e.target.closest('.del-match');
    if (matchBtn) { deleteMatch(parseInt(matchBtn.dataset.idx, 10)); return; }
    const expBtn = e.target.closest('.exp-match');
    if (expBtn) { exportMatch(parseInt(expBtn.dataset.idx, 10)); return; }
    const playerBtn = e.target.closest('.del-player');
    if (playerBtn) { removePlayer(parseInt(playerBtn.dataset.idx, 10)); return; }
  });

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryAdminLogin();
  });

  document.getElementById('new-player-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });

  // ============================================================
  // Init
  // ============================================================
  document.getElementById('match-date').value = new Date().toISOString().split('T')[0];
  // Restore admin session from localStorage (intentionally per-device)
  if (localStorage.getItem(ADMIN_SESSION_KEY) === '1') {
    setAdminMode(true);
  }
  // Load heroes from deadlock-api, then connect to Firebase
  loadHeroes().then(() => initFirebase()).catch(() => initFirebase());
</script>
</body>
</html>
